<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style id="theme-vars">
:root {
  /* ── Brand Colors ── */
  --color-primary: #FF6B00;
  --color-primary-light: #FF8C33;
  --color-primary-dark: #E05E00;
  --color-primary-50: #FFF5EC;
  --color-primary-100: #FFE8D5;
  --color-primary-200: #FFD0AB;
  --color-primary-300: #FFB57E;
  --color-primary-400: #FF8C33;
  --color-primary-500: #FF6B00;
  --color-primary-600: #E05E00;
  --color-primary-700: #B84D00;
  --color-primary-800: #903D00;
  --color-primary-900: #6B2E00;

  /* ── Neutral Colors ── */
  --color-neutral-50: #FAFAFA;
  --color-neutral-100: #F5F5F5;
  --color-neutral-200: #E5E5E5;
  --color-neutral-300: #D4D4D4;
  --color-neutral-400: #A3A3A3;
  --color-neutral-500: #737373;
  --color-neutral-600: #525252;
  --color-neutral-700: #404040;
  --color-neutral-800: #262626;
  --color-neutral-900: #171717;

  /* ── State Colors ── */
  --state-success: #22C55E;
  --state-warning: #F59E0B;
  --state-error: #EF4444;
  --state-info: #3B82F6;

  /* ── Surface & Background ── */
  --surface-primary: #FFFFFF;
  --surface-secondary: #F8F8F8;
  --surface-tertiary: #F0F0F0;
  --surface-inverted: #171717;

  /* ── Text Colors ── */
  --text-primary: #171717;
  --text-secondary: #525252;
  --text-tertiary: #A3A3A3;
  --text-inverse: #FFFFFF;
  --text-link: #FF6B00;

  /* ── Border Colors ── */
  --border-default: #E5E5E5;
  --border-light: #F0F0F0;
  --border-dark: #D4D4D4;

  /* ── Typography ── */
  --font-family-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-family-display: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

  --font-size-xs: 0.625rem;    /* 10px */
  --font-size-sm: 0.75rem;     /* 12px */
  --font-size-base: 0.875rem;  /* 14px */
  --font-size-md: 1rem;        /* 16px */
  --font-size-lg: 1.125rem;    /* 18px */
  --font-size-xl: 1.25rem;     /* 20px */
  --font-size-2xl: 1.5rem;     /* 24px */
  --font-size-3xl: 1.875rem;   /* 30px */

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* ── Spacing ── */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-base: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;

  /* ── Radius ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows ── */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.08);
}

/* ── Typography Classes ── */
.text-display {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-bold);
  line-height: var(--line-height-tight);
}

.text-heading {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-semibold);
  line-height: var(--line-height-tight);
}

.text-body {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
}

.text-caption {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--text-tertiary);
}

.text-price {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
}

.text-badge {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-medium);
  font-size: var(--font-size-xs);
}

    </style>

<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen flex flex-col" style="background: var(--surface-secondary); max-width: 375px; margin: 0 auto;">

      <!-- Top Section: Logo & Tagline -->
      <section class="flex flex-col items-center pt-16 pb-8 px-6">
        <!-- Logo -->
        <div class="w-20 h-20 rounded-full flex items-center justify-center mb-4" style="background: linear-gradient(135deg, var(--color-primary-light), var(--color-primary-dark)); box-shadow: 0 8px 24px rgba(255, 107, 0, 0.3);">
          <span class="text-heading text-2xl" style="color: var(--text-inverse); font-size: 1.75rem;">乐购</span>
        </div>
        <!-- Tagline -->
        <p class="text-body" style="color: var(--text-secondary); font-size: var(--font-size-md); letter-spacing: 0.05em;">品质生活，触手可及</p>
      </section>

      <!-- Login Card -->
      <section class="flex-1 bg-white rounded-t-3xl px-6 pt-8 pb-6" style="border-radius: 24px 24px 0 0; box-shadow: 0 -2px 20px rgba(0,0,0,0.04);">

        <!-- Login Tabs -->
        <div class="flex mb-8" style="border-bottom: 1px solid var(--border-light);">
          <button id="tab-password" class="flex-1 pb-3 text-center font-semibold transition-all" style="color: var(--color-primary); font-size: var(--font-size-md); border-bottom: 2px solid var(--color-primary); margin-bottom: -1px;" onclick="switchTab('password')">密码登录</button>
          <button id="tab-sms" class="flex-1 pb-3 text-center font-medium transition-all" style="color: var(--text-tertiary); font-size: var(--font-size-md); border-bottom: 2px solid transparent; margin-bottom: -1px;" onclick="switchTab('sms')">验证码登录</button>
        </div>

        <!-- Phone Number Input -->
        <div class="mb-5">
          <label class="block mb-2 text-body" style="color: var(--text-secondary); font-size: var(--font-size-base);">手机号</label>
          <div class="flex items-center rounded-lg px-4 transition-colors" style="border: 1.5px solid var(--border-default); height: 48px; background: var(--surface-primary);" onfocusin="this.style.borderColor='var(--color-primary)'" onfocusout="this.style.borderColor='var(--border-default)'">
            <span class="text-body mr-3" style="color: var(--text-primary); font-size: var(--font-size-md); white-space: nowrap;">+86</span>
            <span style="width: 1px; height: 20px; background: var(--border-default); margin-right: 12px;"></span>
            <input type="tel" placeholder="请输入手机号" maxlength="11" class="flex-1 bg-transparent outline-none text-body" style="color: var(--text-primary); font-size: var(--font-size-md); font-family: var(--font-family-base);" />
          </div>
        </div>

        <!-- Password Input (visible in password mode) -->
        <div id="field-password" class="mb-5">
          <label class="block mb-2 text-body" style="color: var(--text-secondary); font-size: var(--font-size-base);">密码</label>
          <div class="flex items-center rounded-lg px-4" style="border: 1.5px solid var(--border-default); height: 48px; background: var(--surface-primary);" onfocusin="this.style.borderColor='var(--color-primary)'" onfocusout="this.style.borderColor='var(--border-default)'">
            <input id="input-password" type="password" placeholder="请输入密码" class="flex-1 bg-transparent outline-none text-body" style="color: var(--text-primary); font-size: var(--font-size-md); font-family: var(--font-family-base);" />
            <button class="flex items-center justify-center" style="width: 24px; height: 24px; color: var(--text-tertiary);" onclick="togglePassword()">

              <svg id="icon-eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="flex justify-end mt-2">
            <a href="#" class="text-body" style="color: var(--text-tertiary); font-size: var(--font-size-sm);">忘记密码？</a>
          </div>
        </div>

        <!-- SMS Code Input (hidden by default) -->
        <div id="field-sms" class="mb-6" style="display: none;">
          <label class="block mb-2 text-body" style="color: var(--text-secondary); font-size: var(--font-size-base);">验证码</label>
          <div class="flex items-center gap-3">
            <div class="flex-1 flex items-center rounded-lg px-4" style="border: 1.5px solid var(--border-default); height: 48px; background: var(--surface-primary);" onfocusin="this.style.borderColor='var(--color-primary)'" onfocusout="this.style.borderColor='var(--border-default)'">

            </div>
            <button id="btn-sms-code" class="flex-shrink-0 rounded-lg px-4 text-medium transition-colors" style="height: 48px; font-size: var(--font-size-base); color: var(--color-primary); border: 1.5px solid var(--color-primary); background: var(--color-primary-50); font-family: var(--font-family-base); font-weight: var(--font-weight-medium); white-space: nowrap;" onclick="sendSmsCode(this)">获取验证码</button>
          </div>
        </div>

        <!-- Login Button -->
        <button data-dom-id="btn-login" class="w-full rounded-lg flex items-center justify-center transition-all active:scale-[0.98]" style="height: 50px; background: linear-gradient(135deg, var(--color-primary-light), var(--color-primary)); color: var(--text-inverse); font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); font-family: var(--font-family-base); box-shadow: 0 4px 16px rgba(255, 107, 0, 0.35); border: none; cursor: pointer; letter-spacing: 0.15em;">
          登 录

        <div class="flex items-start mt-4 px-1">
          <input type="checkbox" checked class="mt-0.5 flex-shrink-0" style="accent-color: var(--color-primary); width: 16px; height: 16px;" />
          <p class="text-body ml-2" style="color: var(--text-tertiary); font-size: var(--font-size-sm); line-height: 1.5;">
            我已阅读并同意 <a href="#" style="color: var(--color-primary);">《用户协议》</a> 和 <a href="#" style="color: var(--color-primary);">《隐私政策》</a>
          </p>
        </div>

        <!-- Divider -->
        <div class="flex items-center my-8">
          <div class="flex-1" style="height: 1px; background: var(--border-light);"></div>
          <span class="px-4 text-body" style="color: var(--text-tertiary); font-size: var(--font-size-sm);">其他登录方式</span>
          <div class="flex-1" style="height: 1px; background: var(--border-light);"></div>
        </div>

        <!-- Social Login -->
        <div class="flex justify-center gap-10">
          <!-- WeChat -->
          <button class="flex flex-col items-center gap-2 group">
            <div class="w-12 h-12 rounded-full flex items-center justify-center transition-transform group-active:scale-95" style="background: #07C160; box-shadow: 0 2px 8px rgba(7, 193, 96, 0.25);">

    <script>
      // Tab switching logic
      function switchTab(mode) {
        const tabPassword = document.getElementById('tab-password');
        const tabSms = document.getElementById('tab-sms');
        const fieldPassword = document.getElementById('field-password');
        const fieldSms = document.getElementById('field-sms');

        if (mode === 'password') {
          tabPassword.style.color = 'var(--color-primary)';
          tabPassword.style.borderBottom = '2px solid var(--color-primary)';
          tabPassword.style.fontWeight = '600';
          tabSms.style.color = 'var(--text-tertiary)';
          tabSms.style.borderBottom = '2px solid transparent';
          tabSms.style.fontWeight = '500';
          fieldPassword.style.display = 'block';
          fieldSms.style.display = 'none';
        } else {
          tabSms.style.color = 'var(--color-primary)';
          tabSms.style.borderBottom = '2px solid var(--color-primary)';
          tabSms.style.fontWeight = '600';
          tabPassword.style.color = 'var(--text-tertiary)';
          tabPassword.style.borderBottom = '2px solid transparent';
          tabPassword.style.fontWeight = '500';
          fieldPassword.style.display = 'none';
          fieldSms.style.display = 'block';
        }
      }

      // Password visibility toggle
      function togglePassword() {
        const input = document.getElementById('input-password');
        const eyeOff = document.getElementById('icon-eye-off');
        const eyeOn = document.getElementById('icon-eye-on');
        if (input.type === 'password') {
          input.type = 'text';
          eyeOff.style.display = 'none';
          eyeOn.style.display = 'block';
        } else {
          input.type = 'password';
          eyeOff.style.display = 'block';
          eyeOn.style.display = 'none';
        }
      }

      // SMS code countdown
      function sendSmsCode(btn) {
        if (btn.disabled) return;
        let seconds = 60;
        btn.disabled = true;
        btn.style.color = 'var(--text-tertiary)';
        btn.style.borderColor = 'var(--border-default)';
        btn.style.background = 'var(--surface-secondary)';
        btn.textContent = seconds + 's 后重发';
        const timer = setInterval(() => {
          seconds--;
          btn.textContent = seconds + 's 后重发';
          if (seconds <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            btn.style.color = 'var(--color-primary)';
            btn.style.borderColor = 'var(--color-primary)';
            btn.style.background = 'var(--color-primary-50)';
            btn.textContent = '获取验证码';
          }
        }, 1000);
      }
    </script>

};
document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-dom-id]');
  if (!el) return;
  var domId = el.getAttribute('data-dom-id');
  var pageKey = INTERACTIONS[domId];
  if (!pageKey) return;
  e.preventDefault();
  var target = ROUTES[pageKey];
  if (target) window.location.href = target;
});
