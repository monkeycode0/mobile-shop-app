<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors ── */
  --color-primary: #FF6B00;
  --color-primary-light: #FF8C33;
  --color-primary-dark: #E05E00;
  --color-primary-50: #FFF5EC;
  --color-primary-100: #FFE8D5;
  --color-primary-200: #FFD0AB;
  --color-primary-300: #FFB57E;
  --color-primary-400: #FF8C33;
  --color-primary-500: #FF6B00;
  --color-primary-600: #E05E00;
  --color-primary-700: #B84D00;
  --color-primary-800: #903D00;
  --color-primary-900: #6B2E00;

  /* ── Neutral Colors ── */
  --color-neutral-50: #FAFAFA;
  --color-neutral-100: #F5F5F5;
  --color-neutral-200: #E5E5E5;
  --color-neutral-300: #D4D4D4;
  --color-neutral-400: #A3A3A3;
  --color-neutral-500: #737373;
  --color-neutral-600: #525252;
  --color-neutral-700: #404040;
  --color-neutral-800: #262626;
  --color-neutral-900: #171717;

  /* ── State Colors ── */
  --state-success: #22C55E;
  --state-warning: #F59E0B;
  --state-error: #EF4444;
  --state-info: #3B82F6;

  /* ── Surface & Background ── */
  --surface-primary: #FFFFFF;
  --surface-secondary: #F8F8F8;
  --surface-tertiary: #F0F0F0;
  --surface-inverted: #171717;

  /* ── Text Colors ── */
  --text-primary: #171717;
  --text-secondary: #525252;
  --text-tertiary: #A3A3A3;
  --text-inverse: #FFFFFF;
  --text-link: #FF6B00;

  /* ── Border Colors ── */
  --border-default: #E5E5E5;
  --border-light: #F0F0F0;
  --border-dark: #D4D4D4;

  /* ── Typography ── */
  --font-family-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-family-display: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

  --font-size-xs: 0.625rem;    /* 10px */
  --font-size-sm: 0.75rem;     /* 12px */
  --font-size-base: 0.875rem;  /* 14px */
  --font-size-md: 1rem;        /* 16px */
  --font-size-lg: 1.125rem;    /* 18px */
  --font-size-xl: 1.25rem;     /* 20px */
  --font-size-2xl: 1.5rem;     /* 24px */
  --font-size-3xl: 1.875rem;   /* 30px */

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* ── Spacing ── */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-base: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;

  /* ── Radius ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows ── */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.08);
}

/* ── Typography Classes ── */
.text-display {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-bold);
  line-height: var(--line-height-tight);
}

.text-heading {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-semibold);
  line-height: var(--line-height-tight);
}

.text-body {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
}

.text-caption {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--text-tertiary);
}

.text-price {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
}

.text-badge {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-medium);
  font-size: var(--font-size-xs);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
      /* Custom checkbox */
      .cart-checkbox {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid var(--color-neutral-300);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .cart-checkbox.checked {
        background: var(--color-primary);
        border-color: var(--color-primary);
      }
      .cart-checkbox.checked svg {
        display: block;
      }
      .cart-checkbox svg {
        display: none;
        width: 12px;
        height: 12px;
        color: white;
      }
      /* Quantity selector */
      .qty-selector {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border-default);
        border-radius: var(--radius-md);
        overflow: hidden;
      }
      .qty-btn {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        background: var(--surface-secondary);
        cursor: pointer;
        font-size: 16px;
        font-weight: 500;
        user-select: none;
        border: none;
      }
      .qty-value {
        width: 36px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: var(--font-size-sm);
        font-weight: var(--font-weight-medium);
        color: var(--text-primary);
        border-left: 1px solid var(--border-default);
        border-right: 1px solid var(--border-default);
        background: white;
      }
      /* Bottom bar */
      .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 50;
        background: white;
        border-top: 1px solid var(--border-light);
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      /* Item unchecked greyed out */
      .cart-item.unchecked {
        opacity: 0.45;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background: var(--surface-secondary); max-width: 375px; margin: 0 auto;">

    <!-- ===== Header ===== -->
    <header class="sticky top-0 z-40 flex items-center justify-between px-4 py-3" style="background: var(--surface-primary); border-bottom: 1px solid var(--border-light);">
      <h1 class="text-heading" style="font-size: var(--font-size-lg); color: var(--text-primary);">购物车<span style="color: var(--text-tertiary); font-weight: 400; font-size: var(--font-size-base);">(3)</span></h1>
      <button class="text-body" style="font-size: var(--font-size-base); color: var(--text-secondary); background: none; border: none; cursor: pointer;">编辑</button>
    </header>

    <!-- ===== Scrollable Content ===== -->
    <main style="padding-bottom: 80px;">

      <!-- ── Store Group ── -->
      <section class="mx-0 mt-2" style="background: var(--surface-primary); border-radius: 0; overflow: hidden;">

        <!-- Store Header -->
        <div class="flex items-center px-4 py-3 gap-3" style="border-bottom: 1px solid var(--border-light);">
          <div class="cart-checkbox checked">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="flex items-center gap-1.5 flex-1 min-w-0">
            <i data-lucide="store" style="width: 16px; height: 16px; color: var(--color-primary); flex-shrink: 0;"></i>
            <span class="text-heading truncate" style="font-size: var(--font-size-base);">乐购官方旗舰店</span>
          </div>
          <span class="text-badge flex-shrink-0" style="background: var(--color-primary-50); color: var(--color-primary); padding: 2px 8px; border-radius: var(--radius-full); border: 1px solid var(--color-primary-100);">满199减20</span>
        </div>

        <!-- Item 1: Headphones (checked) -->
        <div class="cart-item flex items-start px-4 py-3 gap-3" style="border-bottom: 1px solid var(--border-light);">
          <div class="cart-checkbox checked" style="margin-top: 22px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="flex flex-1 min-w-0 gap-3">
            <img src="../assets/product-headphones.jpg" alt="索尼 WH-1000XM5" class="flex-shrink-0 rounded-md object-cover" style="width: 80px; height: 80px; background: var(--surface-secondary);" />
            <div class="flex flex-col flex-1 min-w-0 justify-between">
              <div>
                <p class="text-body" style="font-size: var(--font-size-sm); color: var(--text-primary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">索尼 WH-1000XM5 降噪耳机 黑色</p>
                <p class="text-caption" style="font-size: var(--font-size-xs); margin-top: 2px;">黑色 / 国行版</p>
              </div>
              <div class="flex items-end justify-between mt-1">
                <span class="text-price" style="font-size: var(--font-size-md);">¥899</span>
                <div class="qty-selector">
                  <button class="qty-btn">-</button>
                  <span class="qty-value">1</span>
                  <button class="qty-btn">+</button>
                </div>
              </div>
            </div>
          </div>
          <!-- Delete icon for item 1 -->
          <button data-dom-id="cart-item-delete" style="flex-shrink: 0; background: none; border: none; cursor: pointer; padding: 4px; margin-top: 2px;" aria-label="删除">
            <i data-lucide="x" style="width: 16px; height: 16px; color: var(--color-neutral-400);"></i>
          </button>
        </div>

        <!-- Item 2: Watch (checked) -->
        <div class="cart-item flex items-start px-4 py-3 gap-3" style="border-bottom: 1px solid var(--border-light);">
          <div class="cart-checkbox checked" style="margin-top: 22px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="flex flex-1 min-w-0 gap-3">
            <img src="../assets/product-watch.jpg" alt="华为 Watch GT4" class="flex-shrink-0 rounded-md object-cover" style="width: 80px; height: 80px; background: var(--surface-secondary);" />
            <div class="flex flex-col flex-1 min-w-0 justify-between">
              <div>
                <p class="text-body" style="font-size: var(--font-size-sm); color: var(--text-primary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">华为 Watch GT4 智能手表 银色</p>
                <p class="text-caption" style="font-size: var(--font-size-xs); margin-top: 2px;">46mm / 银色</p>
              </div>
              <div class="flex items-end justify-between mt-1">
                <span class="text-price" style="font-size: var(--font-size-md);">¥1488</span>
                <div class="qty-selector">
                  <button class="qty-btn">-</button>
                  <span class="qty-value">1</span>
                  <button class="qty-btn">+</button>
                </div>
              </div>
            </div>
          </div>
          <button style="flex-shrink: 0; background: none; border: none; cursor: pointer; padding: 4px; margin-top: 2px;" aria-label="删除">
            <i data-lucide="x" style="width: 16px; height: 16px; color: var(--color-neutral-400);"></i>
          </button>
        </div>

        <!-- Item 3: Sneakers (unchecked, greyed out) -->
        <div class="cart-item unchecked flex items-start px-4 py-3 gap-3">
          <div class="cart-checkbox" style="margin-top: 22px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="flex flex-1 min-w-0 gap-3">
            <img src="../assets/product-sneakers.jpg" alt="Nike Air Max 270" class="flex-shrink-0 rounded-md object-cover" style="width: 80px; height: 80px; background: var(--surface-secondary);" />
            <div class="flex flex-col flex-1 min-w-0 justify-between">
              <div>
                <p class="text-body" style="font-size: var(--font-size-sm); color: var(--text-primary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">Nike Air Max 270 运动跑鞋</p>
                <p class="text-caption" style="font-size: var(--font-size-xs); margin-top: 2px;">42码 / 橙白</p>
              </div>
              <div class="flex items-end justify-between mt-1">
                <span class="text-price" style="font-size: var(--font-size-md);">¥599</span>
                <div class="qty-selector">
                  <button class="qty-btn">-</button>
                  <span class="qty-value">1</span>
                  <button class="qty-btn">+</button>
                </div>
              </div>
            </div>
          </div>
          <button style="flex-shrink: 0; background: none; border: none; cursor: pointer; padding: 4px; margin-top: 2px;" aria-label="删除">
            <i data-lucide="x" style="width: 16px; height: 16px; color: var(--color-neutral-400);"></i>
          </button>
        </div>

      </section>

      <!-- ── You might also like ── -->
      <section class="mt-4 px-0" style="background: var(--surface-primary);">
        <div class="px-4 pt-4 pb-2">
          <h2 class="text-heading" style="font-size: var(--font-size-base); color: var(--text-primary);">猜你喜欢</h2>
        </div>
        <div class="flex gap-3 px-4 pb-4 overflow-x-auto no-scrollbar">
          <!-- Card 1 -->
          <div class="flex-shrink-0 rounded-lg overflow-hidden" style="width: 110px; background: var(--surface-secondary);">
            <div style="width: 110px; height: 110px; background: linear-gradient(135deg, #FF6B00, #FFB57E);"></div>
            <div class="p-2">
              <p class="text-body" style="font-size: 10px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">蓝牙音箱便携式</p>
              <p class="text-price" style="font-size: var(--font-size-sm); margin-top: 2px;">¥129</p>
            </div>
          </div>
          <!-- Card 2 -->
          <div class="flex-shrink-0 rounded-lg overflow-hidden" style="width: 110px; background: var(--surface-secondary);">
            <div style="width: 110px; height: 110px; background: linear-gradient(135deg, #6366F1, #A5B4FC);"></div>
            <div class="p-2">
              <p class="text-body" style="font-size: 10px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">无线充电器快充</p>
              <p class="text-price" style="font-size: var(--font-size-sm); margin-top: 2px;">¥79</p>
            </div>
          </div>
          <!-- Card 3 -->
          <div class="flex-shrink-0 rounded-lg overflow-hidden" style="width: 110px; background: var(--surface-secondary);">
            <div style="width: 110px; height: 110px; background: linear-gradient(135deg, #22C55E, #86EFAC);"></div>
            <div class="p-2">
              <p class="text-body" style="font-size: 10px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">运动水杯大容量</p>
              <p class="text-price" style="font-size: var(--font-size-sm); margin-top: 2px;">¥49</p>
            </div>
          </div>
          <!-- Card 4 -->
          <div class="flex-shrink-0 rounded-lg overflow-hidden" style="width: 110px; background: var(--surface-secondary);">
            <div style="width: 110px; height: 110px; background: linear-gradient(135deg, #F59E0B, #FDE68A);"></div>
            <div class="p-2">
              <p class="text-body" style="font-size: 10px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">数据线三合一</p>
              <p class="text-price" style="font-size: var(--font-size-sm); margin-top: 2px;">¥29</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Spacer for bottom bar -->
      <div style="height: 20px;"></div>

    </main>

    <!-- ===== Bottom Checkout Bar (Fixed) ===== -->
    <div class="bottom-bar">
      <div class="flex items-center justify-between px-4" style="height: 56px; max-width: 375px; margin: 0 auto;">
        <!-- Left: Select All -->
        <div class="flex items-center gap-2">
          <div class="cart-checkbox checked" data-dom-id="btn-select-all">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <span class="text-body" style="font-size: var(--font-size-sm); color: var(--text-primary);">全选</span>
        </div>

        <!-- Middle: Total -->
        <div class="flex items-center gap-1 flex-1 justify-end mr-3">
          <span class="text-body" style="font-size: var(--font-size-sm); color: var(--text-primary);">合计:</span>
          <span class="text-price" style="font-size: var(--font-size-xl);">¥2387</span>
          <span class="text-caption" style="font-size: 10px; margin-left: 4px;">已优惠¥20</span>
        </div>

        <!-- Right: Checkout Button -->
        <button data-dom-id="btn-checkout" style="background: var(--color-primary); color: white; border: none; border-radius: var(--radius-full); padding: 0 20px; height: 40px; font-size: var(--font-size-base); font-weight: var(--font-weight-semibold); cursor: pointer; white-space: nowrap; letter-spacing: 0.5px;">结算(2)</button>
      </div>
      <!-- Tab Bar -->
      <div style="position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 375px; height: 50px; background: var(--surface-primary); border-top: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom, 0); z-index: 40;">
        <a data-dom-id="nav-home" style="display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; cursor: pointer;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
          <span style="font-size: 10px; color: var(--text-tertiary);">首页</span>
        </a>
        <a style="display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
          <span style="font-size: 10px; color: var(--text-tertiary);">分类</span>
        </a>
        <a style="display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; position: relative;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          <span style="font-size: 10px; color: var(--color-primary);">购物车</span>
        </a>
        <a style="display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <span style="font-size: 10px; color: var(--text-tertiary);">我的</span>
        </a>
      </div>
    </div>

    <script>lucide.createIcons();</script>
<script>
const ROUTES = {
  'page-home': 'index.html',
  'page-login': 'login.html',
  'page-search': 'search.html',
  'page-product': 'product.html',
  'page-cart': 'cart.html',
  'page-payment': 'payment.html',
  'page-orders': 'orders.html'
};
const INTERACTIONS = {
  'btn-login': 'page-home',
  'btn-checkout': 'page-payment',
  'btn-submit-order': 'page-orders',
  'btn-add-cart': 'page-cart',
  'btn-buy-now': 'page-payment',
  'nav-home': 'page-home',
  'nav-category': 'page-search',
  'nav-cart': 'page-cart',
  'nav-profile': 'page-orders',
  'search-bar': 'page-search',
  'search-back': 'page-home',

};
document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-dom-id]');
  if (!el) return;
  var domId = el.getAttribute('data-dom-id');
  var pageKey = INTERACTIONS[domId];
  if (!pageKey) return;
  e.preventDefault();
  var target = ROUTES[pageKey];
  if (target) window.location.href = target;
});
