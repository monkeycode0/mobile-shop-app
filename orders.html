<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单记录</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors ── */
  --color-primary: #FF6B00;
  --color-primary-light: #FF8C33;
  --color-primary-dark: #E05E00;
  --color-primary-50: #FFF5EC;
  --color-primary-100: #FFE8D5;
  --color-primary-200: #FFD0AB;
  --color-primary-300: #FFB57E;
  --color-primary-400: #FF8C33;
  --color-primary-500: #FF6B00;
  --color-primary-600: #E05E00;
  --color-primary-700: #B84D00;
  --color-primary-800: #903D00;
  --color-primary-900: #6B2E00;

  /* ── Neutral Colors ── */
  --color-neutral-50: #FAFAFA;
  --color-neutral-100: #F5F5F5;
  --color-neutral-200: #E5E5E5;
  --color-neutral-300: #D4D4D4;
  --color-neutral-400: #A3A3A3;
  --color-neutral-500: #737373;
  --color-neutral-600: #525252;
  --color-neutral-700: #404040;
  --color-neutral-800: #262626;
  --color-neutral-900: #171717;

  /* ── State Colors ── */
  --state-success: #22C55E;
  --state-warning: #F59E0B;
  --state-error: #EF4444;
  --state-info: #3B82F6;

  /* ── Surface & Background ── */
  --surface-primary: #FFFFFF;
  --surface-secondary: #F8F8F8;
  --surface-tertiary: #F0F0F0;
  --surface-inverted: #171717;

  /* ── Text Colors ── */
  --text-primary: #171717;
  --text-secondary: #525252;
  --text-tertiary: #A3A3A3;
  --text-inverse: #FFFFFF;
  --text-link: #FF6B00;

  /* ── Border Colors ── */
  --border-default: #E5E5E5;
  --border-light: #F0F0F0;
  --border-dark: #D4D4D4;

  /* ── Typography ── */
  --font-family-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-family-display: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

  --font-size-xs: 0.625rem;    /* 10px */
  --font-size-sm: 0.75rem;     /* 12px */
  --font-size-base: 0.875rem;  /* 14px */
  --font-size-md: 1rem;        /* 16px */
  --font-size-lg: 1.125rem;    /* 18px */
  --font-size-xl: 1.25rem;     /* 20px */
  --font-size-2xl: 1.5rem;     /* 24px */
  --font-size-3xl: 1.875rem;   /* 30px */

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* ── Spacing ── */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-base: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;

  /* ── Radius ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows ── */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.08);
}

/* ── Typography Classes ── */
.text-display {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-bold);
  line-height: var(--line-height-tight);
}

.text-heading {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-semibold);
  line-height: var(--line-height-tight);
}

.text-body {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
}

.text-caption {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--text-tertiary);
}

.text-price {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
}

.text-badge {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-medium);
  font-size: var(--font-size-xs);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased pb-[64px]" style="background: var(--surface-secondary); color: var(--text-primary);">

    <!-- ═══════ Header ═══════ -->
    <header class="sticky top-0 z-30 flex items-center justify-center h-[44px] px-4" style="background: var(--surface-primary); border-bottom: 1px solid var(--border-light);">
      <button data-dom-id="orders-back" class="absolute left-3 flex items-center justify-center w-8 h-8 rounded-full" style="color: var(--text-primary);" aria-label="返回">
        <i data-lucide="chevron-left" class="w-5 h-5"></i>
      </button>
      <h1 class="text-heading" style="font-size: var(--font-size-lg);">我的订单</h1>
    </header>

    <!-- ═══════ Order Tabs ═══════ -->
    <nav class="sticky top-[44px] z-20 flex overflow-x-auto no-scrollbar" style="background: var(--surface-primary); border-bottom: 1px solid var(--border-light);">
      <button class="order-tab active flex-shrink-0 relative px-4 py-3 text-sm font-medium" style="font-size: var(--font-size-base); color: var(--color-primary);">
        全部
        <span class="absolute bottom-0 left-1/2 -translate-x-1/2 w-5 h-[3px] rounded-full" style="background: var(--color-primary);"></span>
      </button>
      <button class="order-tab flex-shrink-0 relative px-4 py-3 text-sm font-medium" style="font-size: var(--font-size-base); color: var(--text-secondary);">
        待付款
      </button>
      <button class="order-tab flex-shrink-0 relative px-4 py-3 text-sm font-medium" style="font-size: var(--font-size-base); color: var(--text-secondary);">
        待发货
      </button>
      <button class="order-tab flex-shrink-0 relative px-4 py-3 text-sm font-medium" style="font-size: var(--font-size-base); color: var(--text-secondary);">
        待收货
      </button>
      <button class="order-tab flex-shrink-0 relative px-4 py-3 text-sm font-medium" style="font-size: var(--font-size-base); color: var(--text-secondary);">
        退换/售后
      </button>
    </nav>

    <!-- ═══════ Order List ═══════ -->
    <main class="px-3 pt-3 space-y-3">

      <!-- ── Order 1: Delivered ── -->
      <section class="rounded-xl overflow-hidden" style="background: var(--surface-primary); box-shadow: var(--shadow-sm);">
        <!-- Order header -->
        <div class="flex items-center justify-between px-3 pt-3 pb-2">
          <div class="flex items-center gap-2">
            <i data-lucide="store" class="w-4 h-4" style="color: var(--text-tertiary);"></i>
            <span class="text-medium text-sm" style="font-weight: var(--font-weight-medium); font-size: var(--font-size-base); color: var(--text-primary);">乐购官方旗舰店</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium" style="font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); background: #ECFDF5; color: var(--state-success);">已完成</span>
            <a href="#" data-dom-id="order-detail-1" class="text-xs" style="font-size: var(--font-size-xs); color: var(--text-tertiary);">查看详情 <i data-lucide="chevron-right" class="w-3 h-3 inline-block align-middle"></i></a>
          </div>
        </div>

        <!-- Order item -->
        <div class="flex items-start gap-3 px-3 py-2">
          <img src="../assets/product-headphones.jpg" alt="索尼 WH-1000XM5 降噪耳机" class="w-20 h-20 rounded-lg object-cover flex-shrink-0" style="border: 1px solid var(--border-light);">
          <div class="flex-1 min-w-0">
            <p class="text-sm leading-snug" style="font-size: var(--font-size-base); color: var(--text-primary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">索尼 WH-1000XM5 降噪耳机 黑色</p>
            <div class="flex items-baseline justify-between mt-1.5">
              <span class="text-xs" style="font-size: var(--font-size-sm); color: var(--text-tertiary);">x1</span>
              <span class="text-price" style="font-size: var(--font-size-base);">¥899</span>
            </div>
          </div>
        </div>

        <!-- Order footer -->
        <div class="flex items-center justify-between px-3 py-3" style="border-top: 1px solid var(--border-light);">
          <span class="text-xs" style="font-size: var(--font-size-sm); color: var(--text-tertiary);">共1件 实付 <span class="text-price" style="font-size: var(--font-size-sm);">¥899</span></span>
          <button data-dom-id="btn-reorder" class="px-4 py-1.5 rounded-full text-sm font-medium" style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); border: 1px solid var(--color-primary); color: var(--color-primary); background: transparent;">再次购买</button>
        </div>
      </section>

      <!-- ── Order 2: Shipping ── -->
      <section class="rounded-xl overflow-hidden" style="background: var(--surface-primary); box-shadow: var(--shadow-sm);">
        <!-- Order header -->
        <div class="flex items-center justify-between px-3 pt-3 pb-2">
          <div class="flex items-center gap-2">
            <i data-lucide="store" class="w-4 h-4" style="color: var(--text-tertiary);"></i>
            <span class="text-medium text-sm" style="font-weight: var(--font-weight-medium); font-size: var(--font-size-base); color: var(--text-primary);">华为官方旗舰店</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium" style="font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); background: #FFF5EC; color: var(--color-primary);">运输中</span>
            <a href="#" class="text-xs" style="font-size: var(--font-size-xs); color: var(--text-tertiary);">查看详情 <i data-lucide="chevron-right" class="w-3 h-3 inline-block align-middle"></i></a>
          </div>
        </div>

        <!-- Order item -->
        <div class="flex items-start gap-3 px-3 py-2">
          <img src="../assets/product-watch.jpg" alt="华为 Watch GT4 智能手表" class="w-20 h-20 rounded-lg object-cover flex-shrink-0" style="border: 1px solid var(--border-light);">
          <div class="flex-1 min-w-0">
            <p class="text-sm leading-snug" style="font-size: var(--font-size-base); color: var(--text-primary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">华为 Watch GT4 智能手表 银色</p>
            <div class="flex items-baseline justify-between mt-1.5">
              <span class="text-xs" style="font-size: var(--font-size-sm); color: var(--text-tertiary);">x1</span>
              <span class="text-price" style="font-size: var(--font-size-base);">¥1488</span>
            </div>
          </div>
        </div>

        <!-- Logistics info -->
        <div class="flex items-start gap-2 mx-3 px-3 py-2 rounded-lg" style="background: var(--surface-secondary);">
          <i data-lucide="truck" class="w-4 h-4 mt-0.5 flex-shrink-0" style="color: var(--color-primary);"></i>
          <p class="text-xs leading-relaxed" style="font-size: var(--font-size-xs); color: var(--text-secondary);">您的包裹已到达深圳中转站，预计明天送达</p>
        </div>

        <!-- Order footer -->
        <div class="flex items-center justify-between px-3 py-3" style="border-top: 1px solid var(--border-light);">
          <span class="text-xs" style="font-size: var(--font-size-sm); color: var(--text-tertiary);">共1件 实付 <span class="text-price" style="font-size: var(--font-size-sm);">¥1488</span></span>
          <button class="px-4 py-1.5 rounded-full text-sm font-medium" style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); border: 1px solid var(--color-primary); color: var(--color-primary); background: transparent;">确认收货</button>
        </div>
      </section>

    </main>

    <!-- ═══════ Bottom Tab Bar ═══════ -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[375px] z-30 flex items-center justify-around h-[60px]" style="background: var(--surface-primary); border-top: 1px solid var(--border-light);">
      <!-- 首页 -->
      <a href="#" data-dom-id="nav-home" class="flex flex-col items-center justify-center gap-0.5 flex-1" style="color: var(--text-tertiary);">
        <i data-lucide="home" class="w-5 h-5"></i>
        <span style="font-size: 10px; font-weight: var(--font-weight-medium);">首页</span>
      </a>
      <!-- 分类 -->
      <a href="#" class="flex flex-col items-center justify-center gap-0.5 flex-1" style="color: var(--text-tertiary);">
        <i data-lucide="layout-grid" class="w-5 h-5"></i>
        <span style="font-size: 10px; font-weight: var(--font-weight-medium);">分类</span>
      </a>
      <!-- 购物车 -->
      <a href="#" data-dom-id="nav-cart" class="flex flex-col items-center justify-center gap-0.5 flex-1" style="color: var(--text-tertiary);">
        <i data-lucide="shopping-cart" class="w-5 h-5"></i>
        <span style="font-size: 10px; font-weight: var(--font-weight-medium);">购物车</span>
      </a>
      <!-- 我的 (active) -->
      <a href="#" data-dom-id="nav-profile" class="flex flex-col items-center justify-center gap-0.5 flex-1" style="color: var(--color-primary);">
        <div class="w-5 h-5 rounded-full flex items-center justify-center" style="background: var(--color-primary);">
          <i data-lucide="user" class="w-3.5 h-3.5" style="color: var(--text-inverse);"></i>
        </div>
        <span style="font-size: 10px; font-weight: var(--font-weight-medium);">我的</span>
      </a>
    </nav>

    <script>lucide.createIcons();</script>
<script>
const ROUTES = {
  'page-home': 'index.html',
  'page-login': 'login.html',
  'page-search': 'search.html',
  'page-product': 'product.html',
  'page-cart': 'cart.html',
  'page-payment': 'payment.html',
  'page-orders': 'orders.html'
};
const INTERACTIONS = {
  'btn-login': 'page-home',
  'btn-checkout': 'page-payment',
  'btn-submit-order': 'page-orders',
  'btn-add-cart': 'page-cart',
  'btn-buy-now': 'page-payment',
  'nav-home': 'page-home',
  'nav-category': 'page-search',
  'nav-cart': 'page-cart',
  'nav-profile': 'page-orders',
  'search-bar': 'page-search',
  'search-back': 'page-home',
  'product-back': 'page-home',
  'product-card-1': 'page-product',
  'product-card-2': 'page-product',
  'payment-back': 'page-cart',
  'orders-back': 'page-home',
  'order-detail-1': 'page-product',
  'cart-item-delete': null,
  'btn-select-all': null,
  'btn-favorite': null,
  'link-register': 'page-home',
  'address-edit': null,
  'payment-method': null
};
document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-dom-id]');
  if (!el) return;
  var domId = el.getAttribute('data-dom-id');
  var pageKey = INTERACTIONS[domId];
  if (!pageKey) return;
  e.preventDefault();
  var target = ROUTES[pageKey];
  if (target) window.location.href = target;
});
</script>
</body>
</html>
